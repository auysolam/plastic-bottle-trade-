<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecycleHub - ซื้อขายขวดพลาสติก</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="landing-container">
        <header class="header">
            <div class="logo-container">
                <img src="logo.png" alt="RecycleHub Logo" class="app-logo">
                <div class="logo-text">Recycle<span class="highlight">Hub</span></div>
            </div>
        </header>
        
        <main class="main-content">
            <div class="hero">
                <h1>เปลี่ยนขวดพลาสติกเป็น <span class="highlight">รายได้</span> และ <span class="highlight">ของรางวัล</span></h1>
                <p>แพลตฟอร์มเชื่อมต่อผู้ขายและผู้รับซื้อขวดพลาสติกรีไซเคิลที่ทันสมัยที่สุด</p>
            </div>
            
            <div class="role-selector">
                <a href="seller.html" class="role-card seller-card">
                    <div class="icon-wrapper">
                        <i class="icon">♻️</i>
                    </div>
                    <h2>สำหรับผู้ขาย</h2>
                    <p>สะสมแต้ม แลกของรางวัล และเรียกคนไปรับซื้อถึงบ้าน</p>
                    <button class="btn btn-primary mt-4">เข้าสู่ระบบผู้ขาย</button>
                </a>
                
                <a href="admin.html" class="role-card admin-card">
                    <div class="icon-wrapper">
                        <i class="icon">🚚</i>
                    </div>
                    <h2>สำหรับผู้รับซื้อ</h2>
                    <p>ดูแผนที่ วางแผนเส้นทาง และจัดการราคารับซื้อ</p>
                    <button class="btn btn-outline mt-4">เข้าสู่ระบบผู้รับซื้อ</button>
                </a>
            </div>
        </main>
    </div>
</body>
</html>
