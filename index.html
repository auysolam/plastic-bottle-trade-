<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecycleHub - ซื้อขายขวดพลาสติก</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (Must load early) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <div class="landing-container">
        <header class="header">
            <div class="logo-container">
                <img src="logo.png" alt="RecycleHub Logo" class="app-logo">
                <div class="logo-text">Recycle<span class="highlight">Hub</span></div>
            </div>
        </header>
        
        <main class="main-content">
            <div class="hero" style="text-align: center; padding: 40px 20px;">
                <h1 style="font-size: 2.5rem; margin-bottom: 20px; color: var(--text-main);">เปลี่ยนขวดพลาสติกเป็น <span class="highlight" style="color: var(--primary);">รายได้</span> และ <span class="highlight" style="color: var(--primary);">ของรางวัล</span></h1>
                <p style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 40px;">แพลตฟอร์มเชื่อมต่อผู้ขายและผู้รับซื้อขวดพลาสติกรีไซเคิลที่ทันสมัยที่สุด</p>
            </div>
            
            <div class="role-selector" style="display: flex; justify-content: center; align-items: center; max-width: 600px; margin: 0 auto; gap: 20px;">
                <a href="seller.html" class="role-card seller-card glass" style="display: block; width: 100%; text-decoration: none; padding: 40px; border-radius: 16px; background: rgba(255, 255, 255, 0.9); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); transition: transform 0.3s ease, box-shadow 0.3s ease; text-align: center; border: 1px solid rgba(16, 185, 129, 0.2);">
                    <div class="icon-wrapper" style="width: 80px; height: 80px; margin: 0 auto 20px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);">
                        ♻️
                    </div>
                    <h2 style="color: var(--text-main); font-size: 1.8rem; margin-bottom: 15px;">เริ่มขายขวดพลาสติก</h2>
                    <p style="color: var(--text-muted); margin-bottom: 25px;">สะสมแต้ม แลกของรางวัล และเรียกคนไปรับซื้อถึงบ้านอย่างง่ายดายผ่านระบบเข้าสู่ระบบด้วย LINE</p>
                    <button class="btn btn-primary w-100" style="padding: 15px 30px; font-size: 1.1rem; border-radius: 50px; text-transform: uppercase; font-weight: 600; letter-spacing: 1px;">เข้าสู่ระบบ / สมัครสมาชิก ผ่าน LINE</button>
                </a>
            </div>
        </main>
        
        <footer style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.9rem; margin-top: 40px;">
            <p>&copy; 2026 RecycleHub. All rights reserved.</p>
        </footer>
    </div>
    <script src="js/store.js?v=3"></script>
</body>
</html>
